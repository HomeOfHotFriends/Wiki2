<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-Book</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="book">
    <section id="start-panel">
      <h1>K-Book</h1>
      <p>Offline growth surface.</p>
      <button onclick="loadSection('growth-law')">Load Growth Law</button>
    </section>

    <section id="output"></section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/translation.js"></script>
  <section id="fetch-panel">
    <h2>Simulated Rhizowiki: Fetch & Translate</h2>
    <input id="fetch-url" type="text" placeholder="Enter public/CC/open source URL" style="width:60%" />
    <button onclick="fetchRhizo()">Fetch & Translate</button>
    <button onclick="randomWiki()">Random Wikipedia</button>
    <div id="fetch-status"></div>
  </section>
  <script>
    async function fetchRhizo(urlOverride) {
      const url = urlOverride || document.getElementById('fetch-url').value;
      document.getElementById('fetch-url').value = url;
      const status = document.getElementById('fetch-status');
      status.innerText = 'Fetching and translating...';
      try {
        const result = await fetchAndTranslate(url, rhizomaticTranslate);
        document.getElementById('output').innerText = result;
        status.innerText = 'Done!';
      } catch (e) {
        status.innerText = 'Error: ' + e.message;
      }
    }

    function randomWiki() {
      const url = 'https://en.wikipedia.org/wiki/Special:Random';
      fetch(url, {redirect: 'follow'})
        .then(resp => resp.url)
        .then(finalUrl => {
          // Use Wikipedia's API to get clean text
          const title = finalUrl.split('/wiki/')[1];
          const api = `https://en.wikipedia.org/api/rest_v1/page/plain/${title}`;
          fetchRhizo(api);
        });
    }

    // Auto-populate and fetch on load, then every 30s
    window.addEventListener('DOMContentLoaded', () => {
      randomWiki();
      setInterval(randomWiki, 30000);
    });
  </script>
</body>
</html>
