<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-Book</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="book">
    <section id="start-panel">
      <h1>K-Book</h1>
      <p>Offline growth surface.</p>
      <button onclick="loadSection('growth-law')">Load Growth Law</button>
    </section>

    <section id="output"></section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/translation.js"></script>
  <section id="fetch-panel">
    <h2>Simulated Rhizowiki: Fetch & Translate</h2>
    <input id="fetch-url" type="text" placeholder="Enter public/CC/open source URL" style="width:60%" />
    <button onclick="fetchRhizo()">Fetch & Translate</button>
    <button onclick="randomWiki()">Random Wikipedia</button>
    <div id="fetch-status"></div>
  </section>
  <script>
    async function fetchRhizo(urlOverride) {
      const url = urlOverride || document.getElementById('fetch-url').value;
      document.getElementById('fetch-url').value = url;
      const status = document.getElementById('fetch-status');
      status.innerText = 'Fetching and translating...';
      try {
        const result = await fetchAndTranslate(url, rhizomaticTranslate);
        document.getElementById('output').innerText = result;
        status.innerText = 'Done!';
      } catch (e) {
        status.innerText = 'Error: ' + e.message;
      }
    }

    const wikiSeeds = [
      'Winnie-the-Pooh',
      'A._A._Milne',
      'Kurt_Vonnegut',
      'Postmodernism',
      'Multi-valued_logic',
      'Classical_logic',
      'Rhizome_(philosophy)',
      'Druid',
      'Fae',
      'Whimsy',
      'Periodic_table'
    ];
    let wikiIndex = 0;
    let rhizoCurrentTitle = null;
    async function seededWiki() {
      let title;
      if (!rhizoCurrentTitle) {
        title = wikiSeeds[wikiIndex % wikiSeeds.length];
        wikiIndex++;
      } else {
        title = rhizoCurrentTitle;
      }
      const api = `https://en.wikipedia.org/api/rest_v1/page/plain/${title}`;
      await fetchRhizo(api);
      // After displaying, fetch links and pick a new one for next round
      try {
        const htmlApi = `https://en.wikipedia.org/api/rest_v1/page/html/${title}`;
        const resp = await fetch(htmlApi);
        if (resp.ok) {
          const html = await resp.text();
          // Extract internal wiki links
          const links = Array.from(html.matchAll(/href=\"\/wiki\/([^\"#:\?]+)\"/g)).map(m => m[1]);
          // Filter out unwanted namespaces (File:, Special:, etc)
          const filtered = links.filter(l => !/^File:|^Special:|^Help:|^Category:|^Wikipedia:|^Portal:|^Template:|^Talk:|^Draft:|^User:/i.test(l));
          if (filtered.length > 0) {
            // Pick a random link for next round
            rhizoCurrentTitle = filtered[Math.floor(Math.random() * filtered.length)];
          } else {
            rhizoCurrentTitle = null;
          }
        } else {
          rhizoCurrentTitle = null;
        }
      } catch (e) {
        rhizoCurrentTitle = null;
      }
    }

    // Auto-populate and fetch on load, then every 30s
    window.addEventListener('DOMContentLoaded', () => {
      seededWiki();
      setInterval(seededWiki, 30000);
    });
  </script>
</body>
</html>
