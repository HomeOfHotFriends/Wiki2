  <g stroke="#005577" stroke-width="2" fill="none">
    <line x1="40" y1="100" x2="260" y2="100"/>
    <line x1="80" y1="100" x2="80" y2="40"/>
    <line x1="220" y1="100" x2="220" y2="40"/>
    <ellipse cx="80" cy="30" rx="20" ry="10"/>
    <ellipse cx="220" cy="30" rx="20" ry="10"/>
    <path d="M100,30 Q150,60 200,30"/>
  </g>
</svg>
