<!--
Rhizome Lattice SVG
Recursive, branching lattice representing rhizomatic connections and non-linear genealogy.
-->
<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <g stroke="#4B8B3B" stroke-width="2" fill="none">
    <path d="M50,180 Q80,120 150,150 Q220,180 250,120"/>
    <path d="M100,160 Q130,100 170,130 Q210,160 230,100"/>
    <path d="M70,140 Q110,80 190,110 Q230,140 250,80"/>
    <circle cx="50" cy="180" r="4" fill="#4B8B3B"/>
    <circle cx="250" cy="120" r="4" fill="#4B8B3B"/>
    <circle cx="100" cy="160" r="3" fill="#4B8B3B"/>
    <circle cx="230" cy="100" r="3" fill="#4B8B3B"/>
    <circle cx="70" cy="140" r="2.5" fill="#4B8B3B"/>
    <circle cx="250" cy="80" r="2.5" fill="#4B8B3B"/>
  </g>
</svg>
