<!--
Whakapapa Spiral SVG
Spiral motif illustrating genealogical layering and recursive ancestry.
-->
<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <g stroke="#7B3F00" stroke-width="2" fill="none">
    <path d="M150,100 m-40,0 a40,40 0 1,1 80,0 a40,40 0 1,1 -80,0"/>
    <path d="M150,100 m-30,0 a30,30 0 1,1 60,0 a30,30 0 1,1 -60,0"/>
    <path d="M150,100 m-20,0 a20,20 0 1,1 40,0 a20,20 0 1,1 -40,0"/>
    <path d="M150,100 m-10,0 a10,10 0 1,1 20,0 a10,10 0 1,1 -20,0"/>
  </g>
</svg>
